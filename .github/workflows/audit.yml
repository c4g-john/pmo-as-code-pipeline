name: docassert audit

# Runs on every PR so it can be a required status check. It validates only the
# documents that changed; if none changed, it passes trivially.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # to post the audit result as a PR comment

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base..head to diff changed documents

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docassert
        run: pip install -e ".[ai]"

      - name: Determine changed documents
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files="$(git diff --name-only "$base" HEAD -- 'documents/**/*.md' | tr '\n' ' ')"
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Changed documents: ${files:-<none>}"

      - name: Run docassert
        id: audit
        if: steps.changed.outputs.files != ''
        env:
          # Set this repo secret to enable AI advisory scoring. Without it, the
          # semantic checks are skipped and structural checks still gate.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docassert validate ${{ steps.changed.outputs.files }} \
            --markdown comment.md --junit report.xml

      - name: Post audit result to the PR
        if: always() && steps.changed.outputs.files != '' && hashFiles('comment.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md

      - name: Upload JUnit report
        if: always() && steps.changed.outputs.files != '' && hashFiles('report.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: docassert-report
          path: report.xml

  # Cross-document traceability. Runs repo-wide on every PR, because changing
  # one document can break links in another.
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docassert
        run: pip install -e ".[ai]"

      - name: Check the project registry is current
        # Blocking: fails if projects.yaml has drifted from the project.md anchors
        # or if any project id/code is duplicated across projects.
        run: docassert projects --check --out projects.yaml

      - name: Check consistency
        id: consistency
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docassert rtm --out RTM.md          # always render first (never fails)
          docassert consistency --markdown consistency.md --junit consistency.xml

      - name: Post consistency result to the PR
        if: always() && hashFiles('consistency.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file consistency.md

      - name: Upload traceability matrix
        if: always() && hashFiles('RTM.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: traceability-matrix
          path: RTM.md

  # Derived project status. Informational (not a required check): it posts the
  # current derived RAG + signals to the PR, and warns if the committed
  # STATUS.md has drifted from what the documents now imply.
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docassert
        run: pip install -e ".[ai]"

      - name: Derive status
        run: docassert status --format md --summary --out status-comment.md

      - name: Post status to the PR
        if: always() && hashFiles('status-comment.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file status-comment.md

      - name: Flag a stale STATUS.md
        run: |
          docassert status --format md --out STATUS.md
          if ! git diff --quiet -- STATUS.md; then
            echo "::warning::STATUS.md is out of date — run 'docassert status --format md --out STATUS.md' and commit it."
          fi
