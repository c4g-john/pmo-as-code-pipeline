name: status dashboard

# Builds the derived status dashboard and publishes it to GitHub Pages on every
# push to main. Requires Pages to be enabled with source = "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions). Until then
# this workflow's deploy step will fail harmlessly; it is not a required check.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install docassert

      - name: Build the status site
        # One command builds the whole site: a portfolio index (one RAG card per
        # project) plus a discrete status page per project, plus the RTM.
        run: docassert pages --out _site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
