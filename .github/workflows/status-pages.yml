name: status dashboard

# Builds the derived status dashboard and publishes it to GitHub Pages on every
# push to main. Requires Pages to be enabled with source = "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions). Until then
# this workflow's deploy step will fail harmlessly; it is not a required check.
on:
  push:
    branches: [main]
  workflow_dispatch:
  # Level-triggered convergence: the dashboard reconciles to HEAD on a
  # fixed cadence even if every push-triggered deploy failed. Offsets are
  # staggered per repo so scheduled rebuilds can never collide.
  schedule:
    - cron: "51 */2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps['deploy-again'].outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the status site
        # One command builds the whole site: a portfolio index (one RAG card per
        # project) plus a discrete status page per project, plus the RTM.
        uses: c4g-john/docassert-action@v1
        with:
          command: pages
          version-file: '.docassert-version'
          extras: ''

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          # Named per attempt: a rerun re-uploads, and deploy-pages refuses
          # a run holding two artifacts with the same name.
          name: github-pages-${{ github.run_attempt }}
      # Pages deployment creation is not retried by the action, and it
      # fails when sibling repos deploy in the same second (fleet-wide
      # merges land simultaneous pushes; ~20% of deploys collided). First
      # attempt is tolerated, a jittered pause desynchronizes the herd,
      # and the second attempt is authoritative.
      - id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
      - name: Desynchronize after a deploy collision
        if: steps.deploy.outcome == 'failure'
        run: sleep $((30 + RANDOM % 90))
      - id: deploy-again
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
