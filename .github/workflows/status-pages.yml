name: status dashboard

# Builds the derived status dashboard and publishes it to GitHub Pages on every
# push to main. Requires Pages to be enabled with source = "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions). Until then
# this workflow's deploy step will fail harmlessly; it is not a required check.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the status site
        # One command builds the whole site: a portfolio index (one RAG card per
        # project) plus a discrete status page per project, plus the RTM.
        uses: c4g-john/docassert-action@v1
        with:
          command: pages
          version-file: '.docassert-version'
          extras: ''

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
