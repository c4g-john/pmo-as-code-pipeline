name: status dashboard

# Builds the derived status dashboard and publishes it to GitHub Pages on every
# push to main. Requires Pages to be enabled with source = "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions). Until then
# this workflow's deploy step will fail harmlessly; it is not a required check.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build the status site
        # One command builds the whole site: a portfolio index (one RAG card per
        # project) plus a discrete status page per project, plus the RTM.
        uses: c4g-john/docassert-action@v1
        with:
          command: pages
          version: '0.7.0'
          extras: ''

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
